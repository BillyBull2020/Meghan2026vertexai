# Cloud Run deployment configuration
# Mount a Cloud Storage bucket as the profiles volume

apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: ironclaw-factory
  labels:
    cloud.googleapis.com/location: us-central1
  annotations:
    run.googleapis.com/description: "Bio DynamX Clonable Voice Agent Factory"
spec:
  template:
    metadata:
      annotations:
        # Scale: min 1 instance to avoid cold starts, max 100 for burst
        autoscaling.knative.dev/minScale: "1"
        autoscaling.knative.dev/maxScale: "100"
        # Allow up to 250 concurrent requests per container
        autoscaling.knative.dev/maxConcurrency: "250"
        # Mount Cloud Storage bucket for profiles
        run.googleapis.com/execution-environment: gen2
    spec:
      containerConcurrency: 250
      timeoutSeconds: 3600  # Voice sessions can be long-lived
      containers:
        - image: us-central1-docker.pkg.dev/bio-dynamx/cloud-run-source-deploy/ironclaw:latest
          ports:
            - containerPort: 8080
          resources:
            limits:
              cpu: "2"
              memory: "1Gi"
          env:
            - name: RUST_LOG
              value: "info,ironclaw=debug"
          volumeMounts:
            - name: profiles-volume
              mountPath: /app/profiles
              readOnly: true
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 15
          startupProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
            failureThreshold: 10
      volumes:
        - name: profiles-volume
          csi:
            driver: gcsfuse.run.googleapis.com
            readOnly: true
            volumeAttributes:
              bucketName: biodynamx-agent-profiles
